# GitInsight Nginx 反向代理配置
# 适用于将 Web 前端和 API 统一暴露在 80/443 端口
#
# 使用方法：
#   1. 将本文件复制到 /etc/nginx/sites-available/gitinsight
#   2. 将 server_name 替换为实际域名
#   3. 启用站点：ln -s /etc/nginx/sites-available/gitinsight /etc/nginx/sites-enabled/
#   4. 重载 nginx：nginx -t && systemctl reload nginx

upstream gitinsight-web {
    server 127.0.0.1:3001;
}

upstream gitinsight-api {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name gitinsight.example.com;

    # === 安全头部 ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === 日志 ===
    access_log /var/log/nginx/gitinsight_access.log;
    error_log  /var/log/nginx/gitinsight_error.log;

    # === Web 前端 ===
    location / {
        proxy_pass http://gitinsight-web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP \;
        proxy_set_header X-Forwarded-For \;
        proxy_set_header X-Forwarded-Proto \;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;
    }

    # === API 服务（含 Swagger 文档）===
    location /api/ {
        rewrite ^/api/(.*) / break;
        proxy_pass http://gitinsight-api;
        proxy_http_version 1.1;
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP \;
        proxy_set_header X-Forwarded-For \;
        proxy_set_header X-Forwarded-Proto \;

        # API 请求可能耗时较长（分析任务）
        proxy_read_timeout    300s;
        proxy_send_timeout    120s;
    }

    # === 健康检查端点 ===
    location /health {
        proxy_pass http://gitinsight-api;
        proxy_http_version 1.1;
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
    }

    # === 静态资源缓存 ===
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?|ttf|eot)$ {
        proxy_pass http://gitinsight-web;
        proxy_http_version 1.1;
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

