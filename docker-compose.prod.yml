# ─── GitInsight 生产部署 Compose 配置 ──────────────
# 用途：生产环境的容器编排，包含资源限制、重启策略、日志配置
# 使用方式：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ────────────────────────────────────────────────────

services:
  postgres:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  api:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      NODE_ENV: production
      ANALYSIS_JOB_STORE: prisma
      ANALYSIS_JOB_DISPATCH_MODE: queue
      ANALYSIS_JOB_QUEUE_EXECUTION_MODE: bullmq
    env_file:
      - .env

  worker:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    environment:
      NODE_ENV: production
      ANALYSIS_JOB_STORE: prisma
    env_file:
      - .env

  web:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    env_file:
      - .env
